steps:
  # Build the backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/prelude-backend"
      - "backend/"

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/prelude-backend"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "prelude-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/prelude-backend"
      - "--platform"
      - "managed"
      - "--region"
      - "us-central1"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=FALSE"
      - "--set-secrets"
      - "GOOGLE_API_KEY=gemini-api-key:latest"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "600"
      - "--session-affinity"

images:
  - "gcr.io/$PROJECT_ID/prelude-backend"

options:
  logging: CLOUD_LOGGING_ONLY
